<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>侍ジャパン スコア予想</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@700&display=swap');

:root {
  --navy:#08111f;--navy2:#0d1e38;--gold:#f5c200;--gold2:#e8960a;
  --red:#cc2233;--white:#f8f5ee;--muted:#7a8aaa;
  --card:rgba(8,17,31,0.85);--border:rgba(245,194,0,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--navy);color:var(--white);font-family:'Noto Sans JP',sans-serif;min-height:100dvh;overflow-x:hidden;}
.hero-bg{position:relative;width:100%;height:340px;overflow:hidden;}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,17,31,0.1) 0%,rgba(8,17,31,0.25) 40%,rgba(8,17,31,0.88) 75%,rgba(8,17,31,1) 100%);}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 24px;text-align:center;}
.header-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-size:10px;font-weight:900;letter-spacing:.2em;padding:4px 14px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;}
.header-title{font-family:'Zen Kurenaido',serif;font-size:clamp(26px,8vw,40px);letter-spacing:.05em;line-height:1.15;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.header-sub{font-size:11px;color:rgba(245,194,0,.7);letter-spacing:.18em;}
.wrap{max-width:480px;margin:0 auto;padding:0 0 60px;width:100%;overflow-x:hidden;}
.auth-bar{display:flex;justify-content:flex-end;align-items:center;padding:10px 16px;gap:10px;}
.auth-status{font-size:11px;color:var(--muted);letter-spacing:.08em;}
.auth-status.admin{color:var(--gold);}
.auth-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 14px;color:var(--white);font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;}
.auth-btn.logout{border-color:rgba(204,34,51,.4);color:#ff8899;}
.auth-btn:active{opacity:.7;}
.game-tabs{display:flex;gap:6px;padding:0 16px 8px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.game-tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 72px;width:72px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .25s;}
.tab.active{background:linear-gradient(135deg,var(--red),#8a0015);border-color:var(--red);box-shadow:0 4px 20px rgba(204,34,51,.45);}
.tab-flag{font-size:18px;display:block;margin-bottom:3px;}
.tab-date{font-size:9px;color:var(--muted);margin-bottom:2px;}
.tab.active .tab-date{color:rgba(255,255,255,.65);}
.tab-vs{font-size:10px;font-weight:700;white-space:normal;word-break:keep-all;line-height:1.3;}
.done-games-section{padding:0 16px 8px;}
.done-games-label{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.done-chips-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.done-chips-row::-webkit-scrollbar{display:none;}
.done-chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(245,194,0,.06);border:1px solid rgba(245,194,0,.18);border-radius:12px;padding:7px 12px;cursor:pointer;transition:all .2s;min-width:80px;}
.done-chip:active{opacity:.7;}
.done-chip.active{background:linear-gradient(135deg,rgba(245,194,0,.18),rgba(232,150,10,.12));border-color:var(--gold);box-shadow:0 2px 12px rgba(245,194,0,.25);}
.done-chip-date{font-size:9px;color:var(--muted);}
.done-chip.active .done-chip-date{color:rgba(245,194,0,.7);}
.done-chip-score{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.03em;white-space:nowrap;}
.done-chip-vs{font-size:9px;color:var(--muted);white-space:nowrap;}
.match-card{margin:0 16px 16px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;position:relative;overflow:hidden;backdrop-filter:blur(8px);}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--red),var(--gold));}
.match-info{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.team-flag{font-size:38px;}
.team-name{font-family:'Zen Kurenaido',serif;font-size:20px;letter-spacing:.05em;}
.team-sub{font-size:9px;color:var(--muted);letter-spacing:.1em;}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:4px;}
.vs-text{font-family:'Oswald',sans-serif;font-size:13px;color:var(--muted);letter-spacing:.1em;}
.match-date-small{font-size:11px;color:var(--gold);font-weight:700;white-space:nowrap;}
.match-time{font-size:10px;color:var(--muted);}
.pred-count{text-align:center;margin:0 16px 14px;font-size:12px;color:var(--muted);}
.pred-count strong{color:var(--gold);font-family:'Oswald',sans-serif;font-size:20px;vertical-align:middle;margin:0 2px;}
.add-section{margin:0 16px 20px;background:rgba(245,194,0,.04);border:1px solid var(--border);border-radius:18px;padding:18px;}
.add-title{font-size:11px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.add-title::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border));}
.add-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.form-row{display:flex;gap:8px;margin-bottom:10px;}
.inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%;}
.inp::placeholder{color:var(--muted);font-size:12px;}
.inp:focus{border-color:var(--gold);}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.score-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.score-inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px;color:var(--gold);font-family:'Oswald',sans-serif;font-size:24px;text-align:center;width:62px;outline:none;transition:border-color .2s;-moz-appearance:textfield;}
.score-inp::-webkit-outer-spin-button,.score-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.score-inp:focus{border-color:var(--gold);}
.score-dash{font-family:'Oswald',sans-serif;font-size:26px;color:var(--muted);}
.submit-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;padding:14px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:900;color:var(--navy);cursor:pointer;letter-spacing:.05em;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(245,194,0,.35);}
.submit-btn:active{transform:scale(.96);}
.login-prompt{margin:0 16px 20px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.12);border-radius:18px;padding:22px;text-align:center;}
.login-prompt p{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.pw-row{display:flex;gap:8px;}
.pw-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.pw-inp:focus{border-color:var(--gold);}
.pw-btn{background:linear-gradient(135deg,var(--red),#8a0015);border:none;border-radius:10px;padding:10px 18px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.pw-btn:active{opacity:.8;}
.preds-section{margin:0 16px;}
.preds-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.preds-title{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.pred-item{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;animation:fadeUp .3s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.pred-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--red),#7a0010);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0;border:2px solid rgba(245,194,0,.3);}
.pred-info{flex:1;min-width:0;}
.pred-name{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pred-time{font-size:10px;color:var(--muted);}
.pred-win{font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:6px;margin-top:3px;display:inline-block;}
.win{background:rgba(245,194,0,.15);color:var(--gold);}
.lose{background:rgba(204,34,51,.15);color:#ff6677;}
.draw{background:rgba(122,138,170,.2);color:var(--muted);}
.pred-score{font-family:'Oswald',sans-serif;font-size:24px;letter-spacing:.05em;white-space:nowrap;}
.pred-score .s-japan{color:var(--gold);}
.pred-score .s-sep{color:var(--muted);margin:0 3px;}
.pred-score .s-opp{color:rgba(255,255,255,.6);}
.delete-btn{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:4px;opacity:.45;transition:opacity .2s;flex-shrink:0;}
.delete-btn:active{opacity:1;}
.crown-btn{background:none;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 7px;opacity:.5;transition:all .2s;flex-shrink:0;}
.crown-btn:active{opacity:1;}
.crown-btn.crowned{border-color:var(--gold);opacity:1;background:rgba(245,194,0,.12);}
.pred-item.winner{background:linear-gradient(135deg,rgba(245,194,0,.12),rgba(232,150,10,.06));border-color:rgba(245,194,0,.5);box-shadow:0 0 20px rgba(245,194,0,.15);}
.winner-badge{font-size:11px;font-weight:900;letter-spacing:.1em;padding:3px 10px;border-radius:20px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);display:inline-block;margin-top:3px;}
.winner-crown{font-size:28px;animation:crownPop .4s cubic-bezier(.34,1.56,.64,1);}
.pred-item.loser{background:rgba(80,20,20,0.5);border-color:rgba(204,34,51,0.35);}
.loser-badge{font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:6px;margin-top:3px;display:inline-block;background:rgba(204,34,51,.2);color:#ff6677;border:1px solid rgba(204,34,51,.3);}
.loser-icon{font-size:28px;}
.miss-btn{background:none;border:1px solid rgba(204,34,51,.3);border-radius:8px;color:#ff8899;font-size:14px;cursor:pointer;padding:4px 7px;opacity:.5;transition:all .2s;flex-shrink:0;}
.miss-btn.missed{border-color:rgba(204,34,51,.6);opacity:1;background:rgba(204,34,51,.12);}
@keyframes crownPop{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0deg);}}
.empty-pred{text-align:center;padding:32px;color:var(--muted);font-size:13px;opacity:.7;}
.schedule-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 16px 20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:13px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:.05em;}
.schedule-btn:active{opacity:.7;background:rgba(255,255,255,.1);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-weight:900;font-size:13px;padding:12px 24px;border-radius:100px;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(245,194,0,.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:linear-gradient(135deg,var(--red),#8a0015);color:#fff;box-shadow:0 8px 24px rgba(204,34,51,.4);}
.toast.notify{background:linear-gradient(135deg,#1a6fa8,#0d4a7a);color:#fff;box-shadow:0 8px 24px rgba(26,111,168,.5);font-size:14px;bottom:auto;top:24px;transform:translateX(-50%) translateY(-80px);}
.toast.notify.show{transform:translateX(-50%) translateY(0);}

/* ACTUAL SCORE */
.actual-section{margin:0 16px 16px;background:rgba(204,34,51,.07);border:1px solid rgba(204,34,51,.3);border-radius:18px;padding:16px 18px;}
.actual-title{font-size:11px;letter-spacing:.15em;color:#ff8899;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.actual-title::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(204,34,51,.3));}
.actual-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(204,34,51,.3),transparent);}
.actual-score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.actual-result{text-align:center;padding:10px;background:rgba(245,194,0,.08);border:1px solid var(--border);border-radius:12px;}
.actual-result-score{font-family:'Oswald',sans-serif;font-size:32px;color:var(--gold);letter-spacing:.1em;}
.actual-result-label{font-size:10px;color:var(--muted);margin-top:2px;}
.auto-crown-btn{width:100%;background:linear-gradient(135deg,var(--red),#8a0015);border:none;border-radius:10px;padding:11px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:.05em;transition:transform .15s;}
.auto-crown-btn:active{transform:scale(.96);}
/* STATS */
.stats-section{margin:0 16px 20px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;}
.stats-title{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.stats-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stats-label{font-size:11px;color:var(--muted);width:80px;flex-shrink:0;}
.stats-bar-wrap{flex:1;height:18px;background:rgba(255,255,255,.06);border-radius:20px;overflow:hidden;}
.stats-bar{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.stats-bar.win-bar{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.stats-bar.lose-bar{background:linear-gradient(90deg,var(--red),#8a0015);}
.stats-bar.draw-bar{background:linear-gradient(90deg,var(--muted),#4a5870);}
.stats-count{font-family:'Oswald',sans-serif;font-size:13px;color:var(--white);width:30px;text-align:right;flex-shrink:0;}
.stats-pct{font-size:10px;color:var(--muted);width:32px;flex-shrink:0;}
.deadline-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(204,34,51,.15);border:1px solid rgba(204,34,51,.3);border-radius:20px;padding:4px 12px;font-size:11px;color:#ff8899;margin:0 16px 14px;}
.deadline-badge.open{background:rgba(245,194,0,.1);border-color:rgba(245,194,0,.3);color:var(--gold);}
/* RANKING */
.ranking-section{margin:20px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;}
.ranking-title{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.rank-item:last-child{border-bottom:none;}
.rank-num{font-family:'Oswald',sans-serif;font-size:20px;color:var(--muted);width:28px;text-align:center;flex-shrink:0;}
.rank-num.gold{color:var(--gold);}
.rank-num.silver{color:#b0b8c8;}
.rank-num.bronze{color:#cd7f32;}
.rank-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),#7a0010);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;}
.rank-name{flex:1;font-weight:700;font-size:14px;}
.rank-score{font-family:'Oswald',sans-serif;font-size:18px;color:var(--gold);}
.rank-label{font-size:10px;color:var(--muted);}
.game-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:6px;margin:2px 2px 0 0;font-weight:700;}
.game-badge.hit{background:rgba(245,194,0,.2);color:var(--gold);border:1px solid rgba(245,194,0,.3);}
.game-badge.played{background:rgba(255,255,255,.07);color:var(--muted);border:1px solid rgba(255,255,255,.1);}
.game-badge.miss{background:transparent;color:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.07);}
.rank-info{flex:1;min-width:0;}
.rank-games{margin-top:4px;display:flex;flex-wrap:wrap;gap:2px;}

/* EDIT MODAL */
.edit-btn{background:none;border:1px solid rgba(245,194,0,.25);border-radius:8px;color:var(--gold);font-size:14px;cursor:pointer;padding:4px 7px;opacity:.5;transition:all .2s;flex-shrink:0;}
.edit-btn:active{opacity:1;}
.allow-edit-btn{background:none;border:1px solid rgba(100,200,100,.3);border-radius:8px;color:#88dd88;font-size:14px;cursor:pointer;padding:4px 7px;opacity:.5;transition:all .2s;flex-shrink:0;}
.allow-edit-btn.allowed{border-color:rgba(100,200,100,.7);opacity:1;background:rgba(100,200,100,.12);}
.allow-edit-btn:active{opacity:1;}
.admin-btns{display:flex;gap:6px;justify-content:flex-end;width:100%;margin-top:4px;}
.pred-item.has-admin-btns{flex-wrap:wrap;}
.pred-edit-time{font-size:10px;color:rgba(245,194,0,.6);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--navy2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:320px;}
.board-section{margin:0 16px 24px;border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;}
.board-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);}
.board-title{font-size:13px;font-weight:700;color:var(--white);letter-spacing:.05em;}
.board-msgs{display:flex;flex-direction:column;gap:0;max-height:320px;overflow-y:auto;}
.board-msg:last-child{border-bottom:none;}
.board-msg.by-admin .board-msg-name{color:var(--gold);}
.board-msg-name{font-size:12px;font-weight:700;color:var(--white);}
.board-msg-body{font-size:13px;color:var(--white);line-height:1.5;word-break:break-word;}
.board-msg-time{font-size:10px;color:var(--muted);}
.board-foot{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.08);}
.board-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;color:var(--white);padding:8px 13px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.board-inp::placeholder{color:var(--muted);}
.board-send{background:var(--red);border:none;border-radius:20px;color:#fff;padding:8px 15px;font-size:13px;font-family:'Noto Sans JP',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;}
.board-del{background:none;border:none;color:rgba(255,100,100,.5);font-size:12px;cursor:pointer;padding:0 4px;align-self:flex-start;}
.board-edit-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:14px;color:rgba(255,255,255,.7);font-size:11px;padding:4px 9px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.board-edit-btn:active{opacity:.7;}
.board-del-all{background:rgba(255,60,60,.15);border:1px solid rgba(255,60,60,.3);border-radius:14px;color:#f88;font-size:11px;padding:4px 9px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.board-del-all:active{opacity:.7;}
.board-msg{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;gap:3px;transition:background .15s;}
.board-msg.selected{background:rgba(220,30,30,.13);}
.board-cb{width:15px;height:15px;accent-color:var(--red);cursor:pointer;flex-shrink:0;margin-right:6px;}

.viewers-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;flex-wrap:wrap;}
.viewers-label{font-size:10px;color:var(--muted);letter-spacing:.08em;white-space:nowrap;}
.viewer-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--white);}
.viewer-dot{width:6px;height:6px;background:#4caf50;border-radius:50%;flex-shrink:0;}

/* COMPLETED GAME TAB */
.tab.done{opacity:.6;}
.tab.done .tab-flag::after{content:'✅';font-size:10px;position:absolute;right:-4px;top:-4px;}
.tab.done{position:relative;}

/* COLLAPSED COMPLETED GAME */
.game-done-card{margin:0 16px 16px;background:rgba(245,194,0,.05);border:1px solid rgba(245,194,0,.2);border-radius:18px;padding:18px;text-align:center;}
.game-done-score{font-family:'Oswald',sans-serif;font-size:28px;color:var(--gold);letter-spacing:.05em;margin-bottom:6px;}
.game-done-stats{font-size:12px;color:var(--muted);margin-bottom:14px;}
.game-expand-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:20px;color:var(--white);font-size:12px;font-family:'Noto Sans JP',sans-serif;padding:7px 18px;cursor:pointer;transition:background .2s;}
.game-expand-btn:active{opacity:.7;}

/* PARTICIPATION LIST */
.part-section{margin:20px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;}
.part-title{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.part-game{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.part-game:last-child{border-bottom:none;}
.part-game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.part-game-label{font-size:13px;font-weight:700;color:var(--white);}
.part-game-count{font-family:'Oswald',sans-serif;font-size:15px;color:var(--gold);}
.part-names{font-size:11px;color:var(--muted);line-height:1.6;}
</style>

<!-- EDIT MODAL -->
<div id="editModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-box">
    <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;">✏️ 予想を編集</div>
    <div id="editModalName" style="font-size:12px;color:var(--muted);margin-bottom:14px;"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;justify-content:center;">
      <span style="font-size:11px;color:var(--muted);">🇯🇵</span>
      <input id="editJp" type="number" min="0" max="30" class="score-inp" inputmode="numeric">
      <span class="score-dash">—</span>
      <input id="editOpp" type="number" min="0" max="30" class="score-inp" inputmode="numeric">
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="closeEditModal()" style="flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:11px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;">キャンセル</button>
      <button onclick="saveEditPred()" style="flex:2;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:10px;padding:11px;color:var(--navy);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:900;cursor:pointer;">保存</button>
    </div>
  </div>
</div>
<!-- EDIT GAME MODAL -->
<div id="editGameModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeEditGameModal()">
  <div class="modal-box" style="width:100%;max-width:400px;">
    <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:14px;">🏟️ 試合情報を編集</div>
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <input id="eg_flag" placeholder="🏳️" maxlength="4" style="width:52px;text-align:center;font-size:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;padding:7px 6px;font-family:'Noto Sans JP',sans-serif;">
      <input id="eg_opp" placeholder="対戦相手（日本語）" style="flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;padding:7px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
      <span style="font-size:11px;color:var(--muted);white-space:nowrap;">試合日時</span>
      <input type="date" id="eg_date" style="flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;padding:7px 8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;">
      <input id="eg_time" placeholder="19:00" maxlength="5" style="width:62px;text-align:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;padding:7px 6px;font-size:12px;font-family:'Noto Sans JP',sans-serif;">
    </div>
    <div style="margin-bottom:8px;">
      <input id="eg_sub" placeholder="OPPONENT (英語・省略可)" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;padding:7px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;">
    </div>
    <div style="margin-bottom:14px;">
      <input id="eg_section" placeholder="ラウンド名（例: 準決勝 / 決勝）" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;padding:7px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;">
    </div>
    <div style="display:flex;gap:8px;">

// ── Supabase ──
async function sbFetch(path,opts={}){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    cache:'no-store',
    ...opts,
    headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'',...(opts.headers||{})}
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')?res.json():null;
}

// ── Countdown Badge ──
function renderDeadlineBadge(){
  const g=GAMES.find(x=>x.id===currentGame);
  const el=document.getElementById('predCount');
  el.innerHTML='';
  let badge=document.getElementById('deadlineBadge');
  if(!badge){badge=document.createElement('div');badge.id='deadlineBadge';el.parentNode.insertBefore(badge,el);}
  if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
  function tick(){
    const now=new Date();
    const diff=getDeadline(g)-now;
    if(now<g.open){
      const diffOpen=g.open-now;
      const oh=Math.floor(diffOpen/1000/60/60);
      const om=Math.floor((diffOpen/1000/60)%60);
      badge.className='deadline-badge';
      badge.innerHTML=`⏳ ${g.date}の予想はまだ始まっていません（あと <b>${oh>0?oh+'時間':''}${om}分</b>で受付開始）`;
      renderFormArea();return;
    }
    if(diff<=0){
      badge.className='deadline-badge';
      badge.innerHTML=`🔒 ${g.date}の予想は締め切りました`;
      if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
      renderFormArea();return;
    }
    const hours=Math.floor(diff/1000/60/60);
    const mins=Math.floor((diff/1000/60)%60);
    const secs=Math.floor((diff/1000)%60);
    badge.className='deadline-badge open';
    if(hours>0) badge.innerHTML=`⏰ 締め切りまで あと <b>${hours}時間${mins}分</b>`;
    else if(mins>0) badge.innerHTML=`⚡ 締め切りまで あと <b>${mins}分${secs}秒</b>`;
    else badge.innerHTML=`🔥 締め切りまで あと <b>${secs}秒！</b>`;
  }
  tick();
  countdownTimer=setInterval(tick,1000);
}

// ── Load ──
async function loadPredictions(notify=false){
  setLoading(true);
  try{
    const rows=await sbFetch(`predictions?game_id=eq.${currentGame}&order=created_at.asc`);
    if(notify && _seenPredIds[currentGame] !== undefined){
      const newOnes=(rows||[]).filter(r=>!_seenPredIds[currentGame].has(r.id));
      if(newOnes.length>0){
        const names=newOnes.map(r=>r.name).join('、');
        showToastNotify(`🎉 ${names}さんが予想を登録しました！`);
      }
    }
    _seenPredIds[currentGame]=new Set((rows||[]).map(r=>r.id));
    const actual=_allActualScores[currentGame];
    const isCollapsed=!!actual&&!_expandedGames.has(currentGame);
    if(!isAdmin){renderDeadlineBadge();renderFormArea();}
    renderActualScoreArea(rows||[]);
    if(isCollapsed){
      renderStats([]);
      renderCollapsedGameSummary(rows||[],actual);
    }else{
      renderStats(rows||[]);
      renderList(rows||[]);
      if(!!actual&&_expandedGames.has(currentGame)){
        const pl=document.getElementById('predList');
        if(pl)pl.innerHTML+=`<div style="text-align:center;padding:12px 0;"><button class="game-expand-btn" onclick="toggleGameExpand('${currentGame}')">🔼 折りたたむ</button></div>`;
      }
    }
    renderPredCount(rows?rows.length:0);
    await renderParticipation();
  }catch(e){
    console.error(e);
    showToastError('データの読み込みに失敗しました');
    renderList([]);
  }
  renderAdminLoginArea();
  setLoading(false);
}

async function saveActualScore(){
  const jp=document.getElementById('actualJp')?.value;
  const opp=document.getElementById('actualOpp')?.value;
  if(jp===''||opp===''){showToastError('スコアを入力してください');return;}
  const jpN=parseInt(jp),oppN=parseInt(opp);
  try{
    const existingScore=await sbFetch(`actual_scores?game_id=eq.${currentGame}`);
    if(existingScore&&existingScore.length>0){
      await sbFetch(`actual_scores?game_id=eq.${currentGame}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({jp:jpN,opp:oppN})});
    }else{
      await sbFetch('actual_scores',{method:'POST',prefer:'return=minimal',body:JSON.stringify({game_id:currentGame,jp:jpN,opp:oppN})});
    }
    const preds=await sbFetch(`predictions?game_id=eq.${currentGame}`);
    for(const p of preds){
      const correct=p.jp===jpN&&p.opp===oppN;
      await sbFetch(`predictions?id=eq.${p.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({is_winner:correct,is_loser:!correct})});
    }
    showToast('👑 正解者に王冠をつけました！');
    await loadAllActualScores();
    renderTabs();
    await loadPredictions();
  }catch(e){console.error(e);showToastError('保存に失敗しました: '+e.message);}
}

async function resetActualScore(){
  if(!confirm('スコアをリセットしますか？全員の王冠も外れます。'))return;
  try{
    await sbFetch(`actual_scores?game_id=eq.${currentGame}`,{method:'DELETE'});
    const preds=await sbFetch(`predictions?game_id=eq.${currentGame}`);
    for(const p of preds){
      await sbFetch(`predictions?id=eq.${p.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({is_winner:false,is_loser:false})});
    }
    showToast('リセットしました');
    await loadAllActualScores();
    renderTabs();
    await loadPredictions();
  }catch(e){showToastError('リセットに失敗しました');}
}

// ── List ──
function setLoading(on){if(on)document.getElementById('predList').innerHTML='<div class="empty-pred" style="opacity:1">⏳ 読み込み中...</div>';}

function renderList(preds){
  const el=document.getElementById('predList');
  if(!preds||preds.length===0){el.innerHTML='<div class="empty-pred">まだ誰も予想していません<br>最初に予想してみよう！⚾</div>';return;}
  const sorted=[...preds].sort((a,b)=>(b.is_winner?2:b.is_loser?-1:0)-(a.is_winner?2:a.is_loser?-1:0));
  el.innerHTML=sorted.map(p=>{
    const init=[...p.name][0].toUpperCase();
    let win='';
    if(p.jp>p.opp) win='<span class="pred-win win">日本勝ち予想 🎉</span>';
    else if(p.jp<p.opp) win='<span class="pred-win lose">相手勝ち予想</span>';
    else win='<span class="pred-win draw">引き分け予想</span>';
    const d=new Date(p.created_at);
    const t=(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    const isWinner=p.is_winner;
    const winnerBadge=isWinner?'<span class="winner-badge">👑 正解！</span>':'';
    const isLoser=p.is_loser;
    const crownBtn=isAdmin?`<button class="crown-btn ${isWinner?'crowned':''}" onclick="toggleCrown('${p.id}',${isWinner})" title="${isWinner?'王冠を外す':'王冠をつける'}">${isWinner?'👑':'☆'}</button>`:'';
    const missBtn=isAdmin&&!isWinner?`<button class="miss-btn ${isLoser?'missed':''}" onclick="toggleLoser('${p.id}',${isLoser})" title="${isLoser?'外れを外す':'外れにする'}">😭</button>`:'';
    const myName=localStorage.getItem('wbc_username')||'';
    const isOwner=myName&&myName===p.name;
    const game=GAMES.find(g=>g.id===p.game_id);
    const gameOpen=game?new Date()<getDeadline(game):false;
    const editAllowed=!!p.edit_allowed;
    const canOwnerEdit=isOwner&&(gameOpen||editAllowed);
    const editBtn=(isAdmin||canOwnerEdit)?`<button class="edit-btn" onclick="openEditModal('${p.id}',${p.jp},${p.opp},'${esc(p.name)}','${esc(JSON.stringify(p.edit_log||[]))}')" title="編集">✏️</button>`:'';
    const allowBtn=isAdmin&&!gameOpen?`<button class="allow-edit-btn ${editAllowed?'allowed':''}" onclick="toggleEditAllowed('${p.id}',${editAllowed})" title="${editAllowed?'編集許可を取り消す':'本人に編集を許可する'}">${editAllowed?'🔓':'🔐'}</button>`:'';
    const delBtn=isAdmin?`<button class="delete-btn" onclick="deletePred('${p.id}')" title="削除">✕</button>`:'';
    const editTimes=(p.edit_log||[]).map(ts=>{const ed=new Date(ts);return `<div class="pred-edit-time">✏️ ${(ed.getMonth()+1)+'/'+ed.getDate()+' '+ed.getHours().toString().padStart(2,'0')+':'+ed.getMinutes().toString().padStart(2,'0')} 編集</div>`;}).join('');
    const loserBadge=isLoser?'<span class="loser-badge">😭 残念！</span>':'';
    const avatar=isWinner?`<div class="winner-crown">👑</div>`:isLoser?`<div class="loser-icon">😭</div>`:`<div class="pred-avatar">${init}</div>`;
    const itemClass=(isWinner?'winner':isLoser?'loser':'')+(isAdmin?' has-admin-btns':'');
    const adminBtns=isAdmin?`<div class="admin-btns">${crownBtn}${missBtn}${allowBtn}${editBtn}${delBtn}</div>`:'';
    const ownerEditBtn=!isAdmin&&canOwnerEdit?editBtn:'';
    return `<div class="pred-item ${itemClass}">
      ${avatar}
      <div class="pred-info"><div class="pred-name">${esc(p.name)}</div>${winnerBadge||loserBadge||win}<div class="pred-time">${t}</div>${editTimes}</div>
      <div class="pred-score"><span class="s-japan">${p.jp}</span><span class="s-sep">—</span><span class="s-opp">${p.opp}</span></div>
      ${ownerEditBtn}${adminBtns}</div>`;
  }).join('');
}

              <input id="ag_sub" placeholder="OPPONENT (英語・省略可)" style="width:100%;box-sizing:border-box;${inp}">
            </div>
            <div style="margin-bottom:6px;">
              <input id="ag_section" placeholder="ラウンド名（例: 準決勝 / 決勝）" style="width:100%;box-sizing:border-box;${inp}">

        </div>
      </div>`;

  }

    <div style="margin:20px 16px 0;text-align:center;padding:16px;border-top:1px solid rgba(255,255,255,.07);">

    </div>`;
}

function showAdminLoginBottom(){
  const pw=prompt('管理者パスワードを入力してください：');
  if(pw===null)return;
  if(pw===PASSWORD){isAdmin=true;stopPolling();renderAuthBar();renderFormArea();renderAdminLoginArea();loadPredictions();renderBoard();showToast('🔓 管理者でログインしました！');_presenceChannel?.untrack();}
  else showToastError('パスワードが違います');
}

// ── CRUD ──
async function addPrediction(){
  const g=GAMES.find(x=>x.id===currentGame);
  if(!g||!isOpen(g)){showToastError('この試合の予想受付は締め切りました');renderFormArea();return;}
  const name=(document.getElementById('nameInp')?.value||'').trim().replace(/^[\s　]+|[\s　]+$/g,'');
  const jp=document.getElementById('scoreJp')?.value;
  const opp=document.getElementById('scoreOpp')?.value;
  if(!name){showToastError('名前を入力してください！');return;}
  if(jp===''||opp===''){showToastError('スコアを入力してください！');return;}
  try{
    const existing=await sbFetch(`predictions?game_id=eq.${currentGame}&name=eq.${encodeURIComponent(name)}`);
    if(existing&&existing.length>0){
      // 締め切り延長後の再登録：既存の予想を上書き確認
      if(!confirm('すでに予想済みです。締め切り延長につき、スコアを上書きしますか？'))return;
      const prev=existing[0];
      const newLog=[...(prev.edit_log||[]),new Date().toISOString()];
      await sbFetch(`predictions?id=eq.${prev.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({jp:parseInt(jp),opp:parseInt(opp),is_winner:false,is_loser:false,edit_log:newLog})});
      document.getElementById('scoreJp').value='';
      document.getElementById('scoreOpp').value='';
      showToast('✅ 予想を上書き登録しました！⚾');
      await loadPredictions();
      return;
    }
    localStorage.setItem('wbc_username',name);
    await sbFetch('predictions',{method:'POST',prefer:'return=minimal',body:JSON.stringify({game_id:currentGame,name,jp:parseInt(jp),opp:parseInt(opp)})});
    document.getElementById('scoreJp').value='';
    document.getElementById('scoreOpp').value='';
    showToast('予想を登録しました！⚾');
    await loadPredictions();
  }catch(e){showToastError('登録に失敗しました');}
}

async function deletePred(id){

  try{await sbFetch(`predictions?id=eq.${id}`,{method:'DELETE'});showToast('削除しました');await loadPredictions();}
  catch(e){showToastError('削除に失敗しました');}

// ── 今日の試合タブを自動選択 ──
function autoSelectGame(){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  let selected=null;
  for(const g of GAMES){const gd=new Date(g.deadline.getFullYear(),g.deadline.getMonth(),g.deadline.getDate());if(gd>=today){selected=g.id;break;}}
  if(!selected) selected=GAMES[GAMES.length-1].id;
  currentGame=selected;
}

// ── Edit Game Modal ──
let _editingGameId=null;
function openEditGameModal(id){
  const g=GAMES.find(x=>x.id===id);
  if(!g||!g.custom)return;
  _editingGameId=id;
  document.getElementById('eg_flag').value=g.flag||'';
  document.getElementById('eg_opp').value=g.opp||'';
  document.getElementById('eg_sub').value=g.sub||'';
  document.getElementById('eg_section').value=g.section_label||'WBC 一次ラウンド';
  document.getElementById('eg_time').value=g.time||'';
  // Parse date from "M/D(曜)" format to yyyy-MM-dd
  try{
    const dl=g.deadline;
    const y=dl.getFullYear();
    const mo=String(dl.getMonth()+1).padStart(2,'0');
    const d=String(dl.getDate()).padStart(2,'0');
    // Try to parse the date field if it exists, otherwise use deadline date
    const dateStr=g.date||'';
    const m2=dateStr.match(/(\d+)\/(\d+)/);
    if(m2){
      const mo2=String(parseInt(m2[1])).padStart(2,'0');
      const d2=String(parseInt(m2[2])).padStart(2,'0');
      document.getElementById('eg_date').value=`${y}-${mo2}-${d2}`;
    }else{
      document.getElementById('eg_date').value=`${y}-${mo}-${d}`;
    }
  }catch(e){document.getElementById('eg_date').value='';}
  document.getElementById('editGameModal').style.display='flex';
}
function closeEditGameModal(){
  document.getElementById('editGameModal').style.display='none';
  _editingGameId=null;
}
async function saveEditGame(){
  const g=GAMES.find(x=>x.id===_editingGameId);
  if(!g)return;
  const flag=(document.getElementById('eg_flag')?.value||'').trim()||'🏳️';
  const opp=(document.getElementById('eg_opp')?.value||'').trim();
  const sub=(document.getElementById('eg_sub')?.value||'').trim();
  const section=(document.getElementById('eg_section')?.value||'').trim()||'WBC 一次ラウンド';
  const timeVal=(document.getElementById('eg_time')?.value||'').trim();
  const dateVal=document.getElementById('eg_date')?.value;
  if(!opp){showToastError('対戦相手名は必須です');return;}
  const days=['日','月','火','水','木','金','土'];
  let date=g.date;
  if(dateVal){const gd=new Date(dateVal+'T00:00:00');date=`${gd.getMonth()+1}/${gd.getDate()}(${days[gd.getDay()]})`;}
  const sub2=sub||opp.toUpperCase();
  const subEncoded=sub2+'|'+section;
  try{
    const updated=await sbFetch(`custom_games?id=eq.${_editingGameId}`,{method:'PATCH',prefer:'return=representation',body:JSON.stringify({date,time:timeVal||g.time,opp,flag,sub:subEncoded})});
    if(!updated||!updated.length){showToastError('更新に失敗しました（データが保存されませんでした）');return;}
    g.date=date;
    g.time=timeVal||g.time;
    g.opp=opp;
    g.flag=flag;
    g.sub=sub2;
    g.section_label=section;
    closeEditGameModal();
    renderTabs();renderMatchCard();renderDeadlineBadge();renderAdminLoginArea();
    showToast('✅ 試合情報を更新しました');
  }catch(e){showToastError('更新に失敗しました');}
}


// ── Presence (閲覧中ユーザー) ──
let _presenceChannel=null;
let _presenceTimer=null;
const _presenceKey=Math.random().toString(36).slice(2);
function initPresence(){
  if(typeof supabase==='undefined'||!supabase.createClient)return;
  const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  function connect(){
    if(_presenceChannel){try{sb.removeChannel(_presenceChannel);}catch(e){}}
    _presenceChannel=sb.channel('viewers',{config:{presence:{key:_presenceKey}}});
    _presenceChannel
      .on('presence',{event:'sync'},()=>{
        const state=_presenceChannel.presenceState();
        const users=Object.values(state).flat().map(u=>u.name).filter(Boolean);
        renderViewersBar(users);
      })
      .subscribe(async(status)=>{
        if(status==='SUBSCRIBED'&&!isAdmin){
          const name=localStorage.getItem('wbc_username')||'名前未入力';
          await _presenceChannel.track({name});
        }
        if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'||status==='CLOSED'){
          setTimeout(connect,3000);
        }
      });
  }
  connect();
  // 定期的にtrackし直してpresenceを維持
  if(_presenceTimer)clearInterval(_presenceTimer);
  _presenceTimer=setInterval(async()=>{
    if(isAdmin||!_presenceChannel)return;
    try{
      const name=localStorage.getItem('wbc_username')||'名前未入力';
      await _presenceChannel.track({name});
    }catch(e){}
  },30000);
}
function renderViewersBar(users){
  const el=document.getElementById('viewersArea');
  if(!el)return;
  if(users.length===0){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML=`<span class="viewers-label">👀 今見ている人</span>`
    +users.map(n=>`<span class="viewer-chip"><span class="viewer-dot"></span>${n}</span>`).join('');
}

// ── 掲示板 ──
let _boardMsgCount=0, _boardSelectMode=false, _boardSelected=new Set(), _boardAllIds=[];

async function loadBoardMsgs(){
  try{
    const r=await sbFetch('messages?order=created_at.asc')||[];
    _boardAllIds=r.map(m=>m.id);
    return r;
  }catch{return[];}
}

function _boardMsgRow(m,selectMode){
  const d=new Date(m.created_at);
  const t=`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  const isAdm=m.from_name==='admin';
  const name=isAdm?'🔑 管理者':esc(m.from_name);
  const myName=localStorage.getItem('wbc_username')||'';
  const canDel=isAdmin||(myName&&m.from_name===myName);
  const cb=isAdmin&&selectMode?`<input type="checkbox" class="board-cb" id="cb_${m.id}" onchange="boardToggleSelect('${m.id}',this.checked)">`:'';
  const delBtn=canDel&&!selectMode?`<button class="board-del" onclick="boardDeleteOne('${m.id}')" title="削除">✕</button>`:'';
  return `<div class="board-msg${isAdm?' by-admin':''}" data-id="${m.id}">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;">${cb}<span class="board-msg-name">${name}</span></div>
      <div style="display:flex;align-items:center;gap:6px;"><span class="board-msg-time">${t}</span>${delBtn}</div>
    </div>
    <div class="board-msg-body">${esc(m.message)}</div>
  </div>`;
}

function _boardHeaderHtml(msgCount){
  if(!isAdmin)return`<div class="board-title">💬 掲示板</div>`;
  if(_boardSelectMode){
    const n=_boardSelected.size;
    return`<div class="board-title">💬 掲示板</div>
      <div style="display:flex;gap:6px;">
        <button class="board-del-all" onclick="boardDeleteSelected()" ${n===0?'disabled style="opacity:.4"':''}>選択削除(${n})</button>
        <button class="board-edit-btn" onclick="boardExitSelect()">完了</button>
      </div>`;
  }
  return`<div class="board-title">💬 掲示板</div>
    <div style="display:flex;gap:6px;">
      <button class="board-edit-btn" onclick="boardEnterSelect()" ${msgCount===0?'disabled style="opacity:.4"':''}>選択</button>
      <button class="board-del-all" onclick="boardDeleteAll()" ${msgCount===0?'disabled style="opacity:.4"':''}>全消し</button>
    </div>`;
}

async function renderBoard(){
  const el=document.getElementById('boardArea');
  if(!el)return;
  const savedInpVal=document.getElementById('boardInp')?.value||'';
  const msgs=await loadBoardMsgs();
  const myName=isAdmin?'admin':(localStorage.getItem('wbc_username')||'');
  const canPost=isAdmin||!!myName;
  if(msgs.length===0){_boardSelectMode=false;_boardSelected.clear();}
  const msgHtml=msgs.length===0
    ?'<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0;">まだ投稿はありません</div>'
    :msgs.map(m=>_boardMsgRow(m,_boardSelectMode)).join('');
  const inputHtml=canPost&&!_boardSelectMode
    ?`<div class="board-foot">
        <input class="board-inp" id="boardInp" placeholder="${isAdmin?'掲示板に投稿...':'メッセージを投稿...'}" maxlength="200" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();boardPost();}">
        <button class="board-send" onclick="boardPost()">投稿</button>
      </div>`
    :(!canPost?'<div style="padding:10px 14px;font-size:11px;color:var(--muted);">予想を投稿すると書き込めます</div>':'');
  el.innerHTML=`<div class="board-section">
    <div class="board-header" id="boardHeader">${_boardHeaderHtml(msgs.length)}</div>
    <div class="board-msgs" id="boardMsgs">${msgHtml}</div>
    ${inputHtml}
  </div>`;
  if(savedInpVal){const inp=document.getElementById('boardInp');if(inp)inp.value=savedInpVal;}
  if(!_boardSelectMode){const bm=document.getElementById('boardMsgs');if(bm)bm.scrollTop=bm.scrollHeight;}
  _boardSelected.forEach(id=>{
    const cb=document.getElementById(`cb_${id}`);if(cb)cb.checked=true;
    const row=document.querySelector(`.board-msg[data-id="${id}"]`);if(row)row.classList.add('selected');
  });
  if(_boardMsgCount>0&&msgs.length>_boardMsgCount)showToastNotify(`💬 掲示板に新しい投稿があります`);
  _boardMsgCount=msgs.length;
}

function _refreshBoardHeader(){
  const h=document.getElementById('boardHeader');
  if(h)h.innerHTML=_boardHeaderHtml(document.querySelectorAll('.board-msg[data-id]').length);
}

function boardEnterSelect(){_boardSelectMode=true;_boardSelected.clear();renderBoard();}
function boardExitSelect(){_boardSelectMode=false;_boardSelected.clear();renderBoard();}

function boardToggleSelect(id,checked){
  if(checked)_boardSelected.add(id); else _boardSelected.delete(id);
  const row=document.querySelector(`.board-msg[data-id="${id}"]`);
  if(row)row.classList.toggle('selected',checked);
  _refreshBoardHeader();
}

async function boardPost(){
  const inp=document.getElementById('boardInp');
  const text=(inp?.value||'').trim();
  if(!text)return;
  const fromName=isAdmin?'admin':(localStorage.getItem('wbc_username')||'');
  if(!fromName)return;
  inp.value='';
  try{
    await sbFetch('messages',{method:'POST',prefer:'return=minimal',body:JSON.stringify({from_name:fromName,message:text})});
    await renderBoard();
  }catch{showToastError('投稿に失敗しました');}
}

async function boardDeleteOne(id){
  try{
    await sbFetch(`messages?id=eq.${id}`,{method:'DELETE',prefer:'return=minimal'});
    _boardSelected.delete(id);
    _boardAllIds=_boardAllIds.filter(i=>i!==id);
    await renderBoard();
  }catch{showToastError('削除に失敗しました');}
}

async function boardDeleteSelected(){
  if(_boardSelected.size===0)return;
  const ids=[..._boardSelected];
  try{
    await sbFetch(`messages?id=in.(${ids.join(',')})`,{method:'DELETE',prefer:'return=minimal'});
    _boardSelected.clear();
    _boardSelectMode=false;
    await renderBoard();
  }catch{showToastError('削除に失敗しました');}
}

async function boardDeleteAll(){
  if(!confirm('掲示板のメッセージを全て削除しますか？'))return;
  if(_boardAllIds.length===0)return;
  try{
    await sbFetch(`messages?id=in.(${_boardAllIds.join(',')})`,{method:'DELETE',prefer:'return=minimal'});
    _boardSelected.clear();
    _boardSelectMode=false;
    _boardAllIds=[];
    await renderBoard();
  }catch{showToastError('削除に失敗しました');}
}
