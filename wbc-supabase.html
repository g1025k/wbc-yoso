<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>侍ジャパン スコア予想</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@700&display=swap');
:root {
  --navy:#08111f;--navy2:#0d1e38;--gold:#f5c200;--gold2:#e8960a;
  --red:#cc2233;--white:#f8f5ee;--muted:#7a8aaa;
  --card:rgba(8,17,31,0.85);--border:rgba(245,194,0,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--navy);color:var(--white);font-family:'Noto Sans JP',sans-serif;min-height:100dvh;overflow-x:hidden;}
.hero-bg{position:relative;width:100%;height:340px;overflow:hidden;}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,17,31,0.1) 0%,rgba(8,17,31,0.25) 40%,rgba(8,17,31,0.88) 75%,rgba(8,17,31,1) 100%);}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 24px;text-align:center;}
.header-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-size:10px;font-weight:900;letter-spacing:.2em;padding:4px 14px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;}
.header-title{font-family:'Zen Kurenaido',serif;font-size:clamp(26px,8vw,40px);letter-spacing:.05em;line-height:1.15;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.header-sub{font-size:11px;color:rgba(245,194,0,.7);letter-spacing:.18em;}
.wrap{max-width:480px;margin:0 auto;padding:0 0 60px;}
.auth-bar{display:flex;justify-content:flex-end;align-items:center;padding:10px 16px;gap:10px;}
.auth-status{font-size:11px;color:var(--muted);letter-spacing:.08em;}
.auth-status.admin{color:var(--gold);}
.auth-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 14px;color:var(--white);font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;}
.auth-btn.logout{border-color:rgba(204,34,51,.4);color:#ff8899;}
.auth-btn:active{opacity:.7;}
.game-tabs{display:flex;gap:6px;padding:0 16px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
.game-tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .25s;}
.tab.active{background:linear-gradient(135deg,var(--red),#8a0015);border-color:var(--red);box-shadow:0 4px 20px rgba(204,34,51,.45);}
.tab-flag{font-size:18px;display:block;margin-bottom:3px;}
.tab-date{font-size:9px;color:var(--muted);margin-bottom:2px;}
.tab.active .tab-date{color:rgba(255,255,255,.65);}
.tab-vs{font-size:10px;font-weight:700;white-space:normal;word-break:keep-all;line-height:1.3;}
.match-card{margin:0 16px 16px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;position:relative;overflow:hidden;backdrop-filter:blur(8px);}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--red),var(--gold));}
.match-info{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.team-flag{font-size:38px;}
.team-name{font-family:'Zen Kurenaido',serif;font-size:20px;letter-spacing:.05em;}
.team-sub{font-size:9px;color:var(--muted);letter-spacing:.1em;}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:4px;}
.vs-text{font-family:'Oswald',sans-serif;font-size:13px;color:var(--muted);letter-spacing:.1em;}
.match-date-small{font-size:11px;color:var(--gold);font-weight:700;white-space:nowrap;}
.match-time{font-size:10px;color:var(--muted);}
.pred-count{text-align:center;margin:0 16px 14px;font-size:12px;color:var(--muted);}
.pred-count strong{color:var(--gold);font-family:'Oswald',sans-serif;font-size:20px;vertical-align:middle;margin:0 2px;}
.add-section{margin:0 16px 20px;background:rgba(245,194,0,.04);border:1px solid var(--border);border-radius:18px;padding:18px;}
.add-title{font-size:11px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.add-title::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border));}
.add-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.form-row{display:flex;gap:8px;margin-bottom:10px;}
.inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%;}
.inp::placeholder{color:var(--muted);font-size:12px;}
.inp:focus{border-color:var(--gold);}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.score-label{font-size:11px;color:var(--muted);white-space:nowrap;}
.score-inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px;color:var(--gold);font-family:'Oswald',sans-serif;font-size:24px;text-align:center;width:62px;outline:none;transition:border-color .2s;-moz-appearance:textfield;}
.score-inp::-webkit-outer-spin-button,.score-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.score-inp:focus{border-color:var(--gold);}
.score-dash{font-family:'Oswald',sans-serif;font-size:26px;color:var(--muted);}
.submit-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;padding:14px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:900;color:var(--navy);cursor:pointer;letter-spacing:.05em;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(245,194,0,.35);}
.submit-btn:active{transform:scale(.96);}
.login-prompt{margin:0 16px 20px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.12);border-radius:18px;padding:22px;text-align:center;}
.login-prompt p{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
.pw-row{display:flex;gap:8px;}
.pw-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.pw-inp:focus{border-color:var(--gold);}
.pw-btn{background:linear-gradient(135deg,var(--red),#8a0015);border:none;border-radius:10px;padding:10px 18px;color:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.pw-btn:active{opacity:.8;}
.preds-section{margin:0 16px;}
.preds-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.preds-title{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.pred-item{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;animation:fadeUp .3s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.pred-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--red),#7a0010);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0;border:2px solid rgba(245,194,0,.3);}
.pred-info{flex:1;min-width:0;}
.pred-name{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pred-time{font-size:10px;color:var(--muted);}
.pred-win{font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 6px;border-radius:6px;margin-top:3px;display:inline-block;}
.win{background:rgba(245,194,0,.15);color:var(--gold);}
.lose{background:rgba(204,34,51,.15);color:#ff6677;}
.draw{background:rgba(122,138,170,.2);color:var(--muted);}
.pred-score{font-family:'Oswald',sans-serif;font-size:24px;letter-spacing:.05em;white-space:nowrap;}
.pred-score .s-japan{color:var(--gold);}
.pred-score .s-sep{color:var(--muted);margin:0 3px;}
.pred-score .s-opp{color:rgba(255,255,255,.6);}
.delete-btn{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:4px;opacity:.45;transition:opacity .2s;flex-shrink:0;}
.delete-btn:active{opacity:1;}
.crown-btn{background:none;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 7px;opacity:.5;transition:all .2s;flex-shrink:0;}
.crown-btn:active{opacity:1;}
.crown-btn.crowned{border-color:var(--gold);opacity:1;background:rgba(245,194,0,.12);}
.pred-item.winner{background:linear-gradient(135deg,rgba(245,194,0,.12),rgba(232,150,10,.06));border-color:rgba(245,194,0,.5);box-shadow:0 0 20px rgba(245,194,0,.15);}
.winner-badge{font-size:11px;font-weight:900;letter-spacing:.1em;padding:3px 10px;border-radius:20px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);display:inline-block;margin-top:3px;}
.winner-crown{font-size:28px;animation:crownPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes crownPop{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0deg);}}
.empty-pred{text-align:center;padding:32px;color:var(--muted);font-size:13px;opacity:.7;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-weight:900;font-size:13px;padding:12px 24px;border-radius:100px;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(245,194,0,.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:linear-gradient(135deg,var(--red),#8a0015);color:#fff;box-shadow:0 8px 24px rgba(204,34,51,.4);}

/* ACTUAL SCORE */
.actual-section{margin:0 16px 16px;background:rgba(204,34,51,.07);border:1px solid rgba(204,34,51,.3);border-radius:18px;padding:16px 18px;}
.actual-title{font-size:11px;letter-spacing:.15em;color:#ff8899;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.actual-title::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(204,34,51,.3));}
.actual-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(204,34,51,.3),transparent);}
.actual-score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.actual-result{text-align:center;padding:10px;background:rgba(245,194,0,.08);border:1px solid var(--border);border-radius:12px;}
.actual-result-score{font-family:'Oswald',sans-serif;font-size:32px;color:var(--gold);letter-spacing:.1em;}
.actual-result-label{font-size:10px;color:var(--muted);margin-top:2px;}
.auto-crown-btn{width:100%;background:linear-gradient(135deg,var(--red),#8a0015);border:none;border-radius:10px;padding:11px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:900;color:#fff;cursor:pointer;letter-spacing:.05em;transition:transform .15s;}
.auto-crown-btn:active{transform:scale(.96);}
/* STATS */
.stats-section{margin:0 16px 20px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;}
.stats-title{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.stats-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.stats-label{font-size:11px;color:var(--muted);width:80px;flex-shrink:0;}
.stats-bar-wrap{flex:1;height:18px;background:rgba(255,255,255,.06);border-radius:20px;overflow:hidden;}
.stats-bar{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.stats-bar.win-bar{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.stats-bar.lose-bar{background:linear-gradient(90deg,var(--red),#8a0015);}
.stats-bar.draw-bar{background:linear-gradient(90deg,var(--muted),#4a5870);}
.stats-count{font-family:'Oswald',sans-serif;font-size:13px;color:var(--white);width:30px;text-align:right;flex-shrink:0;}
.stats-pct{font-size:10px;color:var(--muted);width:32px;flex-shrink:0;}
.deadline-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(204,34,51,.15);border:1px solid rgba(204,34,51,.3);border-radius:20px;padding:4px 12px;font-size:11px;color:#ff8899;margin:0 16px 14px;}
.deadline-badge.open{background:rgba(245,194,0,.1);border-color:rgba(245,194,0,.3);color:var(--gold);}
/* RANKING */
.ranking-section{margin:20px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;}
.ranking-title{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.rank-item:last-child{border-bottom:none;}
.rank-num{font-family:'Oswald',sans-serif;font-size:20px;color:var(--muted);width:28px;text-align:center;flex-shrink:0;}
.rank-num.gold{color:var(--gold);}
.rank-num.silver{color:#b0b8c8;}
.rank-num.bronze{color:#cd7f32;}
.rank-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),#7a0010);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;}
.rank-name{flex:1;font-weight:700;font-size:14px;}
.rank-score{font-family:'Oswald',sans-serif;font-size:18px;color:var(--gold);}
.rank-label{font-size:10px;color:var(--muted);}
.game-badge{display:inline-block;font-size:9px;padding:2px 6px;border-radius:6px;margin:2px 2px 0 0;font-weight:700;}
.game-badge.hit{background:rgba(245,194,0,.2);color:var(--gold);border:1px solid rgba(245,194,0,.3);}
.game-badge.played{background:rgba(255,255,255,.07);color:var(--muted);border:1px solid rgba(255,255,255,.1);}
.game-badge.miss{background:transparent;color:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.07);}
.rank-info{flex:1;min-width:0;}
.rank-games{margin-top:4px;display:flex;flex-wrap:wrap;gap:2px;}

</style>
</head>
<body>
<div class="wrap">
  <div class="hero-bg">
    <img class="hero-img" id="heroImg" alt="WBC応援">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="header-badge">⚾ WBC 2026 侍ジャパン</div>
      <div class="header-title">スコア予想<br>スコアを当ててアイコンゲット！</div>
      <div class="header-sub">SCORE PREDICTION BATTLE</div>
    </div>
  </div>
  <div class="auth-bar">
    <div class="auth-status" id="authStatus">👀 観覧モード</div>
    <button class="auth-btn" id="authBtn" onclick="toggleAuth()">管理者ログイン</button>
  </div>
  <div class="game-tabs" id="gameTabs"></div>
  <div class="match-card" id="matchCard"></div>
  <div class="pred-count" id="predCount"></div>
  <div id="formArea"></div>
  <!-- ACTUAL SCORE (admin) -->
  <div id="actualScoreArea"></div>

  <!-- STATS BAR -->
  <div id="statsArea"></div>

  <!-- PREDICTIONS -->
  <div class="preds-section">
    <div class="preds-header"><div class="preds-title">みんなの予想</div></div>
    <div id="predList"></div>
  </div>

  <!-- RANKING -->
  <div id="rankingArea"></div>
</div>
<div class="toast" id="toast"></div>

// ── Supabase ──
async function sbFetch(path,opts={}){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    ...opts,
    headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'',...(opts.headers||{})}
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const ct=res.headers.get('content-type')||'';
  return ct.includes('json')?res.json():null;
}

// ── Deadline Badge & Countdown ──
let countdownTimer=null;

function renderDeadlineBadge(){
  const g=GAMES.find(x=>x.id===currentGame);
  const el=document.getElementById('predCount');
  el.innerHTML='';
  let badge=document.getElementById('deadlineBadge');
  if(!badge){
    badge=document.createElement('div');
    badge.id='deadlineBadge';
    el.parentNode.insertBefore(badge,el);
  }
  if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}

  function updateBadge(){
    const now=new Date();
    const diff=g.deadline-now;
    if(diff<=0){
      badge.className='deadline-badge';
      badge.innerHTML=`🔒 ${g.date}の予想は締め切りました`;
      if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;}
      renderFormArea();
      return;
    }
    const hours=Math.floor(diff/1000/60/60);
    const mins=Math.floor((diff/1000/60)%60);
    const secs=Math.floor((diff/1000)%60);
    badge.className='deadline-badge open';
    if(hours>0){
      badge.innerHTML=`⏰ 締め切りまで あと <b>${hours}時間${mins}分</b>`;
    } else if(mins>0){
      badge.innerHTML=`⚡ 締め切りまで あと <b>${mins}分${secs}秒</b>`;
    } else {
      badge.innerHTML=`🔥 締め切りまで あと <b>${secs}秒！</b>`;
    }
  }
  updateBadge();
  countdownTimer=setInterval(updateBadge,1000);
}

async function resetActualScore(){
  if(!confirm('スコアをリセットしますか？全員の王冠も外れます。'))return;
  try{
    await sbFetch(`actual_scores?game_id=eq.${currentGame}`,{method:'DELETE'});
    // 全員の王冠を外す
    const preds=await sbFetch(`predictions?game_id=eq.${currentGame}`);
    for(const p of preds){
      await sbFetch(`predictions?id=eq.${p.id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({is_winner:false})});
    }
    showToast('リセットしました');
    await loadPredictions();
  }catch(e){
    showToastError('リセットに失敗しました');
  }
}

async function saveActualScore(){
  const jp=document.getElementById('actualJp')?.value;
  const opp=document.getElementById('actualOpp')?.value;
  if(jp===''||opp===''){showToastError('スコアを入力してください');return;}
  const jpN=parseInt(jp), oppN=parseInt(opp);
  try{
    // Upsert actual score
    await sbFetch('actual_scores',{
      method:'POST',
      prefer:'resolution=merge-duplicates,return=minimal',
      body:JSON.stringify({game_id:currentGame,jp:jpN,opp:oppN})
    });
    // Get all predictions for this game
    const preds=await sbFetch(`predictions?game_id=eq.${currentGame}`);
    // Update is_winner for each
    for(const p of preds){
      const correct=(p.jp===jpN && p.opp===oppN);
      await sbFetch(`predictions?id=eq.${p.id}`,{
        method:'PATCH',
        prefer:'return=minimal',
        body:JSON.stringify({is_winner:correct})
      });
    }
    showToast('👑 正解者に王冠をつけました！');
    await loadPredictions();
  }catch(e){
    console.error(e);
    showToastError('保存に失敗しました: '+e.message);
  }
}

// ── Stats Bar ──
function renderStats(preds){
  const el=document.getElementById('statsArea');
  if(!preds||preds.length===0){el.innerHTML='';return;}
  const win=preds.filter(p=>p.jp>p.opp).length;
  const lose=preds.filter(p=>p.jp<p.opp).length;
  const draw=preds.filter(p=>p.jp===p.opp).length;
  const total=preds.length;
  const pct=n=>total>0?Math.round(n/total*100):0;
  el.innerHTML=`
    <div class="stats-section">
      <div class="stats-title">📊 みんなの予想集計</div>
      <div class="stats-row">
        <div class="stats-label">🇯🇵 日本勝ち</div>
        <div class="stats-bar-wrap"><div class="stats-bar win-bar" style="width:${pct(win)}%"></div></div>
        <div class="stats-count">${win}</div>
        <div class="stats-pct">${pct(win)}%</div>
      </div>
      <div class="stats-row">
        <div class="stats-label">相手勝ち</div>
        <div class="stats-bar-wrap"><div class="stats-bar lose-bar" style="width:${pct(lose)}%"></div></div>
        <div class="stats-count">${lose}</div>
        <div class="stats-pct">${pct(lose)}%</div>
      </div>
      <div class="stats-row">
        <div class="stats-label">引き分け</div>
        <div class="stats-bar-wrap"><div class="stats-bar draw-bar" style="width:${pct(draw)}%"></div></div>
        <div class="stats-count">${draw}</div>
        <div class="stats-pct">${pct(draw)}%</div>
      </div>
    </div>`;
}

// ── Prediction List ──
function setLoading(on){
  if(on)document.getElementById('predList').innerHTML='<div class="empty-pred" style="opacity:1">⏳ 読み込み中...</div>';
}

function renderList(preds){
  const el=document.getElementById('predList');
  if(!preds||preds.length===0){el.innerHTML='<div class="empty-pred">まだ誰も予想していません<br>最初に予想してみよう！⚾</div>';return;}
  const sorted=[...preds].sort((a,b)=>(b.is_winner?1:0)-(a.is_winner?1:0));
  el.innerHTML=sorted.map(p=>{
    const init=[...p.name][0].toUpperCase();
    let win='';
    if(p.jp>p.opp)win='<span class="pred-win win">日本勝ち予想 🎉</span>';
    else if(p.jp<p.opp)win='<span class="pred-win lose">相手勝ち予想</span>';
    else win='<span class="pred-win draw">引き分け予想</span>';
    const d=new Date(p.created_at);
    const t=(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    const isWinner=p.is_winner;
    const winnerBadge=isWinner?'<span class="winner-badge">👑 正解！</span>':'';
    const crownBtn=isAdmin?`<button class="crown-btn ${isWinner?'crowned':''}" onclick="toggleCrown('${p.id}',${isWinner})" title="${isWinner?'王冠を外す':'王冠をつける'}">${isWinner?'👑':'☆'}</button>`:'';
    const delBtn=isAdmin?`<button class="delete-btn" onclick="deletePred('${p.id}')" title="削除">✕</button>`:'';
    const avatar=isWinner?`<div class="winner-crown">👑</div>`:`<div class="pred-avatar">${init}</div>`;
    return `<div class="pred-item ${isWinner?'winner':''}">
      ${avatar}
      <div class="pred-info"><div class="pred-name">${esc(p.name)}</div>${winnerBadge||win}<div class="pred-time">${t}</div></div>
      <div class="pred-score"><span class="s-japan">${p.jp}</span><span class="s-sep">—</span><span class="s-opp">${p.opp}</span></div>
      ${crownBtn}${delBtn}</div>`;
  }).join('');
}

// ── Ranking ──
async function renderRanking(){
  const el=document.getElementById('rankingArea');
  try{
    // 全予想を取得
    const all=await sbFetch('predictions?order=name.asc');
    if(!all||all.length===0){el.innerHTML='';return;}

    // 名前ごとに集計
    const map={};
    GAMES.forEach(g=>{
      // game_idごとに参加者をマーク
    });
    all.forEach(p=>{
      if(!map[p.name]) map[p.name]={name:p.name, wins:0, total:0, games:{}};
      map[p.name].total++;
      map[p.name].games[p.game_id]={jp:p.jp,opp:p.opp,winner:p.is_winner};
      if(p.is_winner) map[p.name].wins++;
    });

    // 正解数→参加数→名前 でソート
    const sorted=Object.values(map).sort((a,b)=>b.wins-a.wins||b.total-a.total||a.name.localeCompare(b.name));
    const medals=['🥇','🥈','🥉'];
    const rankColors=['gold','silver','bronze'];
    const gameLabels={g0:'3/6',g1:'3/7',g2:'3/8'};

    el.innerHTML=`
      <div class="ranking-section">
        <div class="ranking-title">🏆 総合ランキング</div>
        ${sorted.map((p,i)=>{
          const gameDetail=GAMES.map(g=>{
            const gd=p.games[g.id];
            if(!gd) return `<span class="game-badge miss">─ ${gameLabels[g.id]}</span>`;
            if(gd.winner) return `<span class="game-badge hit">👑 ${gameLabels[g.id]} ${gd.jp}-${gd.opp}</span>`;
            return `<span class="game-badge played">${gameLabels[g.id]} ${gd.jp}-${gd.opp}</span>`;
          }).join('');
          return `<div class="rank-item">
            <div class="rank-num ${rankColors[i]||''}">${medals[i]||i+1}</div>
            <div class="rank-avatar">${[...p.name][0].toUpperCase()}</div>
            <div class="rank-info">
              <div class="rank-name">${esc(p.name)}</div>
              <div class="rank-games">${gameDetail}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div class="rank-score">${p.wins}<span style="font-size:12px;color:var(--muted);">/${p.total}</span></div>
              <div class="rank-label">正解/参加</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }catch(e){console.error(e);el.innerHTML='';}
}

// ── CRUD ──
async function addPrediction(){
  const name=(document.getElementById('nameInp')?.value||'').trim().replace(/^[\s　]+|[\s　]+$/g,'');
  const jp=document.getElementById('scoreJp')?.value;
  const opp=document.getElementById('scoreOpp')?.value;
  if(!name){showToastError('名前を入力してください！');return;}
  if(jp===''||opp===''){showToastError('スコアを入力してください！');return;}
  try{
    // 重複チェック
    const existing=await sbFetch(`predictions?game_id=eq.${currentGame}&name=eq.${encodeURIComponent(name)}`);
    if(existing&&existing.length>0){showToastError('この試合はすでに予想済みです！');return;}
    localStorage.setItem('wbc_username',name);
    await sbFetch('predictions',{method:'POST',prefer:'return=minimal',body:JSON.stringify({game_id:currentGame,name,jp:parseInt(jp),opp:parseInt(opp)})});
    document.getElementById('scoreJp').value='';
    document.getElementById('scoreOpp').value='';
    showToast('予想を登録しました！⚾');
    await loadPredictions();
  }catch(e){showToastError('登録に失敗しました');}
}

async function deletePred(id){
  if(!confirm('この予想を削除しますか？'))return;
  try{await sbFetch(`predictions?id=eq.${id}`,{method:'DELETE'});showToast('削除しました');await loadPredictions();}
  catch(e){showToastError('削除に失敗しました');}
}

async function toggleCrown(id,currentlyWinner){
  try{
    await sbFetch(`predictions?id=eq.${id}`,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({is_winner:!currentlyWinner})});
    await loadPredictions();
    showToast(currentlyWinner?'王冠を外しました':'👑 王冠をつけました！');
  }catch(e){showToastError('更新に失敗しました');}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function switchGame(id){currentGame=id;renderTabs();renderMatchCard();renderFormArea();restoreName();loadPredictions();}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast show';setTimeout(()=>t.className='toast',2500);}
function showToastError(m){const t=document.getElementById('toast');t.textContent=m;t.className='toast error show';setTimeout(()=>t.className='toast',2500);}

// ── Name Memory ──
function saveName(val){
  if(val) localStorage.setItem('wbc_username', val);
}
function restoreName(){
  const saved=localStorage.getItem('wbc_username');
  const inp=document.getElementById('nameInp');
  if(saved&&inp) inp.value=saved;
}

// ── 今日の試合タブを自動選択 ──
function autoSelectGame(){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const dates={g0:new Date('2026-03-06'),g1:new Date('2026-03-07'),g2:new Date('2026-03-08')};
  let selected=null;
  for(const g of GAMES){
    if(dates[g.id]>=today){selected=g.id;break;}
  }
  if(!selected) selected=GAMES[GAMES.length-1].id;
  currentGame=selected;
}

// INIT
autoSelectGame();
renderTabs();renderMatchCard();renderAuthBar();renderFormArea();restoreName();loadPredictions();
setInterval(loadPredictions,30000);
</script>
